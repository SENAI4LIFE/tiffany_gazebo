controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    hexapod_controller:
      type: forward_command_controller/ForwardCommandController

joint_state_broadcaster:
  ros__parameters:
    use_sim_time: true

hexapod_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - coxa1
      - femur1
      - tibia1
      - coxa2
      - femur2
      - tibia2
      - coxa3
      - femur3
      - tibia3
      - coxa4
      - femur4
      - tibia4
      - coxa5
      - femur5
      - tibia5
      - coxa6
      - femur6
      - tibia6
    interface_name: position